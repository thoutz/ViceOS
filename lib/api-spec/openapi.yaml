openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: TavernOS API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Session/user auth operations
  - name: campaigns
    description: Campaign management
  - name: characters
    description: Character management
  - name: sessions
    description: Game session management
  - name: maps
    description: Map management
  - name: messages
    description: Chat messages
  - name: player-characters
    description: Player-owned character sheets (pool or campaign-linked)
  - name: invites
    description: Campaign invite acceptance
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login with username
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /characters:
    get:
      operationId: listPlayerCharacters
      tags: [player-characters]
      summary: List my character sheets
      responses:
        "200":
          description: Active characters owned by the current user
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PlayerCharacter"
    post:
      operationId: createPlayerCharacter
      tags: [player-characters]
      summary: Create a character sheet
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePlayerCharacterRequest"
      responses:
        "201":
          description: Character created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlayerCharacter"

  /characters/{characterId}:
    get:
      operationId: getPlayerCharacter
      tags: [player-characters]
      summary: Get a character sheet
      parameters:
        - name: characterId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Character details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlayerCharacter"
    put:
      operationId: updatePlayerCharacter
      tags: [player-characters]
      summary: Update my character sheet
      parameters:
        - name: characterId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePlayerCharacterRequest"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlayerCharacter"
    delete:
      operationId: deletePlayerCharacter
      tags: [player-characters]
      summary: Soft-delete a character sheet
      parameters:
        - name: characterId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Removed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /invites/pending:
    get:
      operationId: listPendingInvites
      tags: [invites]
      summary: Pending campaign invites for the current user
      responses:
        "200":
          description: Invites
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PendingInvite"

  /invites/{inviteId}/accept:
    post:
      operationId: acceptCampaignInvite
      tags: [invites]
      summary: Accept a campaign invite
      parameters:
        - name: inviteId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AcceptInviteRequest"
      responses:
        "200":
          description: Accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AcceptInviteResponse"

  /invites/{inviteId}/decline:
    post:
      operationId: declineCampaignInvite
      tags: [invites]
      summary: Decline a campaign invite
      parameters:
        - name: inviteId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Declined
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /campaigns:
    get:
      operationId: listCampaigns
      tags: [campaigns]
      summary: List user campaigns (as DM vs as player)
      responses:
        "200":
          description: Campaigns grouped by role
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CampaignListResponse"
    post:
      operationId: createCampaign
      tags: [campaigns]
      summary: Create a campaign
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCampaignRequest"
      responses:
        "201":
          description: Campaign created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CampaignWithRole"

  /campaigns/join:
    post:
      operationId: joinCampaign
      tags: [campaigns]
      summary: Join a campaign via invite code
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JoinCampaignRequest"
      responses:
        "200":
          description: Joined campaign
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CampaignWithRole"

  /campaigns/{campaignId}/invite:
    post:
      operationId: inviteCampaignUser
      tags: [campaigns]
      summary: DM invites a user by username
      parameters:
        - name: campaignId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InviteCampaignUserRequest"
      responses:
        "200":
          description: Invite created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InviteCampaignUserResponse"

  /campaigns/{campaignId}/members:
    post:
      operationId: addCampaignMember
      tags: [campaigns]
      summary: DM adds a character sheet to the campaign
      parameters:
        - name: campaignId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddCampaignMemberRequest"
      responses:
        "200":
          description: Member added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /campaigns/{campaignId}/members/{characterId}:
    delete:
      operationId: removeCampaignMember
      tags: [campaigns]
      summary: DM removes a character from the campaign
      parameters:
        - name: campaignId
          in: path
          required: true
          schema:
            type: string
        - name: characterId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Member removed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /campaigns/{campaignId}:
    get:
      operationId: getCampaign
      tags: [campaigns]
      summary: Get a campaign
      parameters:
        - name: campaignId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Campaign details with party members
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CampaignWithMembers"
    delete:
      operationId: deleteCampaign
      tags: [campaigns]
      summary: Delete a campaign (DM only)
      description: >-
        Permanently removes the campaign and related sessions, maps, characters in this campaign,
        invites, and members. Only the campaign owner (DM) may call this.
      parameters:
        - name: campaignId
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Campaign deleted
        "403":
          description: Forbidden — not the campaign DM
        "404":
          description: Campaign not found

  /campaigns/{campaignId}/characters:
    get:
      operationId: listCharacters
      tags: [characters]
      summary: List characters in campaign
      parameters:
        - name: campaignId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of characters
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Character"
    post:
      operationId: createCharacter
      tags: [characters]
      summary: Create a character
      parameters:
        - name: campaignId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCharacterRequest"
      responses:
        "201":
          description: Character created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Character"

  /campaigns/{campaignId}/characters/{characterId}:
    get:
      operationId: getCharacter
      tags: [characters]
      summary: Get a character
      parameters:
        - name: campaignId
          in: path
          required: true
          schema:
            type: string
        - name: characterId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Character details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Character"
    put:
      operationId: updateCharacter
      tags: [characters]
      summary: Update a character
      parameters:
        - name: campaignId
          in: path
          required: true
          schema:
            type: string
        - name: characterId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCharacterRequest"
      responses:
        "200":
          description: Character updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Character"

  /campaigns/{campaignId}/sessions:
    get:
      operationId: listSessions
      tags: [sessions]
      summary: List sessions in campaign
      parameters:
        - name: campaignId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of sessions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GameSession"
    post:
      operationId: createSession
      tags: [sessions]
      summary: Create a session
      parameters:
        - name: campaignId
          in: path
          required: true
          schema:
            type: string
      responses:
        "201":
          description: Session created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GameSession"

  /campaigns/{campaignId}/sessions/{sessionId}:
    get:
      operationId: getSession
      tags: [sessions]
      summary: Get a session
      parameters:
        - name: campaignId
          in: path
          required: true
          schema:
            type: string
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Session details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GameSession"
    put:
      operationId: updateSession
      tags: [sessions]
      summary: Update session state
      parameters:
        - name: campaignId
          in: path
          required: true
          schema:
            type: string
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSessionRequest"
      responses:
        "200":
          description: Session updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GameSession"

  /campaigns/{campaignId}/sessions/{sessionId}/ai-context:
    get:
      operationId: getSessionAiContext
      tags: [sessions]
      summary: DM-only aggregated context for AI assistants
      description: >-
        Returns campaign summary, party, session memory JSON blobs, recent chat,
        and a compiled plain-text narrative suitable for LLM prompts.
      parameters:
        - name: campaignId
          in: path
          required: true
          schema:
            type: string
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Session AI context
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionAiContext"
        "403":
          description: Forbidden — not the campaign DM
        "404":
          description: Session not found

  /campaigns/{campaignId}/sessions/{sessionId}/ai-story-assistant:
    post:
      operationId: postDmStoryAssistant
      tags: [sessions]
      summary: DM story assistant (Groq)
      description: >-
        Server-side chat completion via Groq (OpenAI-compatible API). Requires GROQ_API_KEY.
        Default model is meta-llama/llama-4-scout-17b-16e-instruct.
      parameters:
        - name: campaignId
          in: path
          required: true
          schema:
            type: string
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DmStoryAssistantRequest"
      responses:
        "200":
          description: Assistant reply
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DmStoryAssistantResponse"
        "400":
          description: Bad request
        "403":
          description: Forbidden — not the campaign DM
        "404":
          description: Session not found
        "502":
          description: Groq API error
        "503":
          description: Groq not configured on the server

  /campaigns/{campaignId}/sessions/{sessionId}/livekit-token:
    post:
      operationId: createLivekitToken
      tags: [sessions]
      summary: Mint a LiveKit JWT for the session video room
      parameters:
        - name: campaignId
          in: path
          required: true
          schema:
            type: string
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Token and connection details for LiveKit
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LiveKitTokenResponse"
        "404":
          description: Session not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: LiveKit is not configured on the server
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /campaigns/{campaignId}/maps:
    get:
      operationId: listMaps
      tags: [maps]
      summary: List maps in campaign
      parameters:
        - name: campaignId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of maps
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GameMap"
    post:
      operationId: createMap
      tags: [maps]
      summary: Create a map
      parameters:
        - name: campaignId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMapRequest"
      responses:
        "201":
          description: Map created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GameMap"

  /campaigns/{campaignId}/maps/{mapId}:
    get:
      operationId: getMap
      tags: [maps]
      summary: Get a map
      parameters:
        - name: campaignId
          in: path
          required: true
          schema:
            type: string
        - name: mapId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Map details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GameMap"
    put:
      operationId: updateMap
      tags: [maps]
      summary: Update map state
      parameters:
        - name: campaignId
          in: path
          required: true
          schema:
            type: string
        - name: mapId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMapRequest"
      responses:
        "200":
          description: Map updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GameMap"

  /campaigns/{campaignId}/sessions/{sessionId}/messages:
    get:
      operationId: listMessages
      tags: [messages]
      summary: List chat messages in session
      parameters:
        - name: campaignId
          in: path
          required: true
          schema:
            type: string
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: List of messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ChatMessage"
    post:
      operationId: postMessage
      tags: [messages]
      summary: Post a chat message
      parameters:
        - name: campaignId
          in: path
          required: true
          schema:
            type: string
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PostMessageRequest"
      responses:
        "201":
          description: Message posted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatMessage"

  /campaigns/{campaignId}/sessions/{sessionId}/messages/{messageId}:
    patch:
      operationId: patchMessage
      tags: [messages]
      summary: Update message (edit story contribution, or DM pin for story assistant)
      parameters:
        - name: campaignId
          in: path
          required: true
          schema:
            type: string
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
        - name: messageId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PatchMessageRequest"
      responses:
        "200":
          description: Message updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatMessage"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Message not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteMessage
      tags: [messages]
      summary: Delete a chat message (DM only; story messages only)
      parameters:
        - name: campaignId
          in: path
          required: true
          schema:
            type: string
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
        - name: messageId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Message deleted
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Message not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    LoginRequest:
      type: object
      properties:
        username:
          type: string
      required:
        - username

    UserResponse:
      type: object
      properties:
        id:
          type: string
        username:
          type: string
      required:
        - id
        - username

    Campaign:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        gameSystem:
          type: string
        setting:
          type: string
        startingLocation:
          type: string
        tone:
          type: string
        houseRules:
          type: string
        status:
          type: string
        inviteCode:
          type: string
        dmUserId:
          type: string
        settings:
          type: object
          additionalProperties: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - gameSystem
        - inviteCode
        - dmUserId
        - createdAt

    CampaignListResponse:
      type: object
      properties:
        as_dm:
          type: array
          items:
            $ref: "#/components/schemas/CampaignWithRole"
        as_player:
          type: array
          items:
            $ref: "#/components/schemas/CampaignWithRole"
      required:
        - as_dm
        - as_player

    CampaignMemberRow:
      type: object
      description: campaign_members row with joined character + player display fields
      properties:
        id:
          type: string
        campaignId:
          type: string
        userId:
          type: string
        characterId:
          type: string
          nullable: true
        role:
          type: string
        status:
          type: string
        joinedAt:
          type: string
          format: date-time
        characterName:
          type: string
          nullable: true
        race:
          type: string
          nullable: true
        class:
          type: string
          nullable: true
        level:
          type: integer
          nullable: true
        personality:
          type: string
          nullable: true
        backstory:
          type: string
          nullable: true
        avatarUrl:
          type: string
          nullable: true
        playerUsername:
          type: string
          nullable: true

    CampaignWithMembers:
      allOf:
        - $ref: "#/components/schemas/CampaignWithRole"
        - type: object
          properties:
            members:
              type: array
              items:
                $ref: "#/components/schemas/CampaignMemberRow"
          required:
            - members

    CampaignWithRole:
      allOf:
        - $ref: "#/components/schemas/Campaign"
        - type: object
          properties:
            role:
              type: string
              enum: [dm, player]
            playerMembershipCharacterId:
              type: string
              nullable: true
              description: When role is player, the character sheet UUID linked on the membership row (null until a hero is chosen or created).
          required:
            - role

    CreateCampaignRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        gameSystem:
          type: string
          default: "D&D 5e"
      required:
        - name

    JoinCampaignRequest:
      type: object
      properties:
        inviteCode:
          type: string
        characterId:
          type: string
          description: Optional. When set, binds this membership to your character sheet.
      required:
        - inviteCode

    InviteCampaignUserRequest:
      type: object
      properties:
        username:
          type: string
      required:
        - username

    InviteCampaignUserResponse:
      type: object
      properties:
        message:
          type: string
        inviteCode:
          type: string

    AddCampaignMemberRequest:
      type: object
      properties:
        characterId:
          type: string
      required:
        - characterId

    MessageResponse:
      type: object
      properties:
        message:
          type: string
      required:
        - message

    AbilityScores:
      type: object
      properties:
        str:
          type: integer
        dex:
          type: integer
        con:
          type: integer
        int:
          type: integer
        wis:
          type: integer
        cha:
          type: integer
      required:
        - str
        - dex
