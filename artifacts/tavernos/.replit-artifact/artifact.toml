kind = "web"
previewPath = "/"
title = "ViceOS"
version = "1.0.0"
id = "artifacts/tavernos"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20140

[services.development]
run = "pnpm --filter @workspace/tavernos run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/tavernos", "run", "build" ]
publicDir = "artifacts/tavernos/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20140"
BASE_PATH = "/"
